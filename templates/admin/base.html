<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>{% block title %}{% endblock %}</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/base.css') }}">
    {% block head %}{% endblock %}
</head>

<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo" style="background: transparent; border-radius: 50%; overflow: hidden;">
                    <img src="{{ url_for('static', filename='images/home/logo.webp') }}" alt="Gram Tarakki Logo"
                        style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div class="title">
                    <h2>Gram Tarakki Foundation</h2>
                    <p>Admin Panel</p>
                </div>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/admin" class="nav-link {% block dashboard_active %}{% endblock %}"><i
                            class="fas fa-tachometer-alt"></i>
                        Dashboard</a></li>
                <li class="nav-item"><a href="#" class="nav-link {% block volunteers_active %}{% endblock %}"><i
                            class="fas fa-users"></i> Volunteers</a></li>
                <li class="nav-item"><a href="#" class="nav-link {% block join_requests_active %}{% endblock %}"><i
                            class="fas fa-envelope"></i> Join Requests</a></li>
                <li class="nav-item"><a href="#" class="nav-link {% block donations_active %}{% endblock %}"><i
                            class="fas fa-donate"></i> Donations</a></li>
                <li class="nav-item"><a href="#" class="nav-link {% block reports_active %}{% endblock %}"><i
                            class="fas fa-chart-bar"></i> Reports</a></li>
                <li class="nav-item"><a href="#" class="nav-link {% block blog_active %}{% endblock %}"><i
                            class="fas fa-blog"></i> Blog / Updates</a></li>
                <li class="nav-item"><a href="#" class="nav-link {% block settings_active %}{% endblock %}"><i
                            class="fas fa-cog"></i> Settings</a></li>
                <li class="nav-item"><a href="/logout" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search volunteer, donation, request...">
                    </div>
                </div>
                <div class="topbar-right">
                    <button class="icon-btn"><i class="fas fa-bell"></i></button>
                    <button class="icon-btn"><i class="fas fa-envelope"></i></button>
                    <div class="profile dropdown">
                        <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Admin">
                        <div class="dropdown-menu">
                            <a href="#">Profile</a>
                            <a href="#">Settings</a>
                            <a href="/logout">Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Content Area -->
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin/base.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
