<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Admin Login | Gram Tarakki Foundation</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/login.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
</head>

<body>
    <div class="login-card">
        <!-- Header -->
        <div class="login-header">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/home/logo.webp') }}" alt="GT Foundation Logo"
                    style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h1>Admin Panel Login</h1>
            <div class="subtitle">Authorized personnel only</div>
        </div>

        <!-- Form -->
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <!-- Error message placeholder -->
            <div id="errorMsg" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <!-- Email / Username -->
            <div class="form-group">
                <label for="username">Email or Userid</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="admin@gtfoundation.in" autocomplete="username">
                </div>
            </div>

            <!-- Password with toggle -->
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Forgot Password -->
            <div class="forgot-row">
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="login-btn">Sign In</button>

            <a href="{{ url_for('home') }}" class="cancel-back">
                <i class="fas fa-arrow-left"></i> Cancel, go back
            </a>

            <div class="demo-note">
                <i class="fas fa-shield-alt"></i> Secure login • Gram Tarakki Foundation • Admin
            </div>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/admin/login.js') }}"></script>
</body>

</html>
