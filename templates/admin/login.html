<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Admin Login | Gram Tarakki Foundation</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/login.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
</head>

<body>
    <div class="login-card" id="loginCard">
        <!-- Header -->
        <div class="login-header" id="loginHeader">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/home/logo.webp') }}" alt="GT Foundation Logo"
                    style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h1 id="cardTitle">Admin Panel Login</h1>
            <div class="subtitle" id="cardSubtitle">Authorized personnel only</div>
        </div>

        <!-- ===================== Step 1: Credentials Form ===================== -->
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <!-- Error message -->
            <div id="errorMsg" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="admin@gtfoundation.in" autocomplete="email">
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Forgot Password -->
            <div class="forgot-row">
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="login-btn" id="loginBtn">Sign In</button>

            <a href="{{ url_for('home') }}" class="cancel-back">
                <i class="fas fa-arrow-left"></i> Cancel, go back
            </a>

            <div class="demo-note">
                <i class="fas fa-shield-alt"></i> Secure login • Gram Tarakki Foundation
            </div>
        </form>

        <!-- ===================== Step 2: OTP Verification ===================== -->
        <div id="otpSection" class="otp-section" style="display: none;">
            <!-- Error message -->
            <div id="otpErrorMsg" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="otpErrorText"></span>
            </div>

            <!-- Email sent indicator -->
            <div class="otp-hero">
                <div class="otp-hero-icon">
                    <i class="fas fa-envelope-open-text"></i>
                </div>
                <p class="otp-hero-title">Check your email</p>
                <p class="otp-hero-email" id="maskedEmail">ad••••@example.com</p>
                <p class="otp-hero-desc">Enter the 6-digit verification code we just sent</p>
            </div>

            <!-- OTP Input Boxes -->
            <div class="otp-input-row" id="otpInputs">
                <input type="text" maxlength="1" class="otp-box" data-index="0" inputmode="numeric"
                    autocomplete="one-time-code">
                <input type="text" maxlength="1" class="otp-box" data-index="1" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-box" data-index="2" inputmode="numeric">
                <span class="otp-dot">•</span>
                <input type="text" maxlength="1" class="otp-box" data-index="3" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-box" data-index="4" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-box" data-index="5" inputmode="numeric">
            </div>

            <!-- Timer -->
            <div class="otp-meta">
                <span class="otp-timer" id="otpTimer">
                    <i class="fas fa-clock"></i>
                    <span>Expires in</span>
                    <strong id="timerCount">5:00</strong>
                </span>
            </div>

            <!-- Verify Button -->
            <button type="button" class="login-btn otp-verify-btn" id="verifyOtpBtn" onclick="handleVerifyOtp()">
                Verify & Sign In
            </button>

            <!-- Resend + Back row -->
            <div class="otp-actions">
                <button type="button" class="otp-action-link" onclick="backToLogin()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
                <span class="otp-action-divider">|</span>
                <button type="button" class="otp-action-link otp-resend" id="resendOtpBtn" onclick="handleResendOtp()"
                    disabled>
                    Resend Code <span id="resendTimer">(30s)</span>
                </button>
            </div>

            <div class="demo-note">
                <i class="fas fa-shield-alt"></i> Two-Step Verification • Gram Tarakki Foundation
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin/login.js') }}"></script>
</body>

</html>
